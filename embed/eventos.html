<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Señal en Vivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        /* Body flexible: centra todo y evita que nada se salga */
        body, html { 
            height: 100%; background: #0d1b2a; color: #e0e0e0; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        header { 
            background: linear-gradient(90deg, #1e3a8a, #60a5fa); 
            padding: 12px 20px; flex-shrink: 0;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.5); 
        }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        
        /* Contenedor que se adapta: sube los botones y ajusta el video */
        .main-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 10px;
        }

        /* REPRODUCTOR TAMAÑO YOUTUBE (Corta lo negro de los lados) */
        .video-wrapper { 
            width: 90%; /* En PC ocupa casi todo el ancho para no dejar negro */
            max-width: 1200px; /* Límite lógico para que no se deforme */
            aspect-ratio: 16 / 9; /* Forma perfecta de TV */
            background: #000; border-radius: 12px; position: relative;
            overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Capa de protección Maikol */
        #maik-guard {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: pointer; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }
        #maik-guard i { font-size: 45px; color: white; background: #3b82f6; padding: 18px; border-radius: 50%; }

        /* Botones que suben y dejan espacio abajo */
        .action-btns { margin-top: 15px; display: flex; gap: 12px; flex-shrink: 0; }
        .btn-pro { 
            padding: 10px 22px; border: none; border-radius: 10px; 
            background: linear-gradient(90deg, #3b82f6, #1e40af); 
            color: #ffffff; cursor: pointer; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }

        /* AJUSTE PARA MÓVILES: No se sale de la pantalla */
        @media (max-width: 768px) {
            .video-wrapper { width: 100%; border-radius: 0; }
            .main-container { padding: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 25px;">⚽</span>
                <h1 style="font-size: 22px; font-weight: 900;">MAIK SPORT</h1>
            </div>
            <a href="../agenda.html" style="color: white; font-size: 20px;"><i class="fas fa-arrow-left"></i></a>
        </div>
    </header>

    <div class="main-container">
        <div style="background: #ef4444; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 10px;">
            EN VIVO
        </div>

        <div class="video-wrapper">
            <div id="maik-guard"><i class="fas fa-play"></i></div>
            <iframe id="vFrame" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts" allowfullscreen></iframe>
        </div>

        <div class="action-btns">
            <button class="btn-pro" onclick="location.reload()"><i class="fas fa-redo"></i> Recargar</button>
            <button class="btn-pro" onclick="toggleFS()"><i class="fas fa-expand"></i> Pantalla Completa</button>
        </div>
    </div>

    <script>
        // Blindaje Maikol
        const r = new URLSearchParams(window.location.search).get("r");
        if (r) document.getElementById("vFrame").src = atob(r);

        document.getElementById('maik-guard').addEventListener('click', function() {
            this.remove();
            window.open = () => null;
        });

        function toggleFS() {
            const el = document.querySelector('.video-wrapper');
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
