<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; }
        .embed-responsive { position: relative; width: 100%; flex-grow: 1; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        #fake-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; cursor: pointer; }
    </style>
</head>
<body>
    <div class="embed-responsive">
        <div id="fake-layer"></div>
        <iframe id="videoFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <script>
        const iframe = document.getElementById("videoFrame");
        const layer = document.getElementById("fake-layer");
        const params = new URLSearchParams(window.location.search);
        const r = params.get("r");

        if (r) { iframe.src = atob(r); }

        // Bloqueo de ventanas emergentes
        window.open = function() { return null; };

        // Eliminar capa al primer clic para dejar jugar
        layer.addEventListener("click", function() {
            layer.style.display = "none";
            window.focus();
        });
    </script>
</body>
</html>
