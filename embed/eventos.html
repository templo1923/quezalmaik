<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.capoplay.net https://*.capoplayer.net https://*.pltvhd.com https://*.tvtvhd.com data: blob:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.capoplay.net https://*.capoplayer.net https://*.pltvhd.com https://*.tvtvhd.com https://cdnjs.cloudflare.com https://code.jquery.com;
        connect-src 'self' https://*.capoplay.net https://*.capoplayer.net https://*.pltvhd.com https://*.tvtvhd.com;
        img-src * data:;
        style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com;
        font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com;
        frame-src 'self' https://*.capoplay.net https://*.capoplayer.net https://*.pltvhd.com https://*.tvtvhd.com;
    ">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Reproductor Oficial</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background: linear-gradient(0deg, #0d1b2a, #1b263b); color: #e0e0e0; overflow-x: hidden; min-height: 100vh; }

        header { background: linear-gradient(90deg, #1e3a8a, #60a5fa); padding: 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 3px 12px rgba(0, 0, 0, 0.5); }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .header-title h1 { color: #ffffff; font-size: 26px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }

        .soccer-ball { font-size: 32px; color: #ffffff; animation: spin 3s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .back-button { background: #2a2a2a; border-radius: 50%; width: 45px; height: 45px; color: #ffffff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .back-button:hover { background: #ef4444; transform: scale(1.1); color: white; }

        .content-container { max-width: 1000px; margin: 20px auto; padding: 0 15px; text-align: center; }
        .live-text { font-size: 18px; font-weight: 700; color: #ffffff; margin-bottom: 15px; background: linear-gradient(90deg, #ef4444, #f87171); padding: 8px 16px; border-radius: 8px; display: inline-block; animation: pulse 2s infinite; text-transform: uppercase; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .embed-responsive { position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.6); background: #000; border: 1px solid rgba(255,255,255,0.05); }
        .embed-responsive-item { position: absolute; top: 0; left: 0; bottom: 0; right: 0; width: 100%; height: 100%; border: none; }

        .reload-button { padding: 12px 25px; border: none; border-radius: 10px; background: linear-gradient(90deg, #374151, #111827); color: #ffffff; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 20px; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .reload-button:hover { background: #3b82f6; transform: translateY(-2px); }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-title" style="display: flex; align-items: center; gap: 12px;">
                <span class="soccer-ball">⚽</span>
                <h1>MAIK SPORT</h1>
            </div>
            <a href="../index.html" class="back-button"><i class="fas fa-arrow-left"></i></a>
        </div>
    </header>

    <div class="content-container">
        <p class="live-text">Transmisión en Vivo</p>

        <div class="embed-responsive" id="wrapper">
            <div id="fake-click-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; cursor: pointer;"></div>
            
            <iframe 
                class="embed-responsive-item" 
                id="videoFrame" 
                allowfullscreen 
                allow="autoplay; encrypted-media"
                referrerpolicy="no-referrer">
            </iframe>
        </div>

        <button type="button" class="reload-button" onclick="location.reload()">
            <i class="fas fa-redo"></i> Recargar Señal
        </button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const iframe = document.getElementById("videoFrame");
            const layer = document.getElementById("fake-click-layer");
            const params = new URLSearchParams(window.location.search);
            const r = params.get("r");

            // 1. CARGA DE VIDEO (Base64)
            if (r) {
                try {
                    iframe.src = atob(r);
                } catch (e) {
                    console.error("Error cargando señal");
                }
            }

            // 2. ESCUDO ANTI-POPUPS (Mata window.open)
            window.open = function() { 
                console.log("🛡️ Maik-Guard: Popup bloqueado");
                return null; 
            };

            // 3. INTERCEPTOR DE CAPA
            layer.addEventListener("click", function() {
                layer.style.display = "none";
                window.focus();
                // Forzamos el foco de vuelta para cerrar intentos de popup
                setTimeout(() => { window.focus(); }, 150);
            });

            // 4. SEGURO DE FOCO (Evita que el iframe robe el control para abrir ads)
            setInterval(() => {
                if (document.activeElement === iframe) {
                    setTimeout(() => { window.focus(); }, 200);
                }
            }, 1000);
        });
    </script>
</body>
</html>
