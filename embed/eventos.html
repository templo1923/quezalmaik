<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Señal Limpia</title>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@0.8/dist/clappr.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #player { width: 100%; height: 100%; }
        
        /* Pantalla de carga profesional */
        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 99;
        }
        .spinner { color: #22c55e; font-size: 50px; animation: fa-spin 1.5s infinite linear; }
        .loading-text { color: white; margin-top: 20px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-circle-notch spinner"></i>
        <p class="loading-text">Extrayendo señal Maik Sport...</p>
    </div>

    <div id="player"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const r = params.get("r");

        async function cargarSeñal() {
            if (!r) {
                document.getElementById("loader").innerHTML = "<p style='color:red;'>Error: No se recibió parámetro de señal.</p>";
                return;
            }

            try {
                // 1. Decodificamos el Base64 (ej: https://tvtvhd.com/canales.php?stream=espn)
                const urlDecodificada = atob(r);
                
                // Extraemos los parámetros de la URL decodificada (lo que va después del ?)
                const queryParams = urlDecodificada.split('?')[1];

                // 2. Consultamos a través de TU PROPIO PROXY en Vercel (más rápido y sin error 522)
                const response = await fetch(`/api/get-source?${queryParams}`);
                const htmlCode = await response.text();

                // 3. Buscamos la variable playbackURL en el código fuente obtenido
                const match = htmlCode.match(/var playbackURL = "(.*?)";/);

                if (match && match[1]) {
                    const m3u8Limpio = match[1];
                    
                    // Ocultamos el cargador
                    document.getElementById("loader").style.display = "none";

                    // 4. Iniciamos el reproductor Clappr con el link real extraído
                    new Clappr.Player({
                        source: m3u8Limpio,
                        parentId: "#player",
                        width: "100%",
                        height: "100%",
                        autoPlay: true,
                        mediacontrol: {seekbar: "#22c55e", buttons: "#FFFFFF"},
                        mimeType: "application/x-mpegURL",
                        // Ajuste para evitar que el reproductor original intente disparar popups
                        disableVideoTagContextMenu: true
                    });
                } else {
                    document.getElementById("loader").innerHTML = "<p style='color:red;'>Señal no encontrada en el origen. Intenta recargar.</p>";
                }
            } catch (error) {
                console.error("Error Maik Sport:", error);
                document.getElementById("loader").innerHTML = "<p style='color:white;'>Error de conexión. Por favor, recarga la página.</p>";
            }
        }

        // Ejecutar la función
        cargarSeñal();

        // Blindaje total contra ventanas emergentes
        window.open = function() { return null; };
    </script>
</body>
</html>
