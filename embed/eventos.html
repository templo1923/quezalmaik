<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maik Sport - Reproductor Pro</title>
    <meta name="referrer" content="no-referrer">
    <style>
        /* Pantalla completa negra sin scroll */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: sans-serif;
        }

        /* El contenedor es el que hace el recorte */
        .recorte-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* AJUSTE MAESTRO: 
           Hacemos el iframe más grande que la pantalla (115%) 
           y lo subimos (-75px) para que el logo de ellos desaparezca arriba.
        */
        #videoFrame {
            position: absolute;
            width: 100%;
            height: 125%; /* Más alto para empujar el footer hacia abajo */
            top: -75px;   /* Sube el contenido para tapar el header de ellos */
            left: 0;
            border: none;
        }

        /* Botón de volver flotante para no perder la navegación */
        .btn-volver {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px 15px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
        }

        /* Capa invisible para evitar clics accidentales en anuncios laterales */
        .escudo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px; /* Protege la zona superior */
            z-index: 999;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="btn-volver">⬅ Volver</a>
    
    <div class="recorte-container">
        <div class="escudo"></div>
        <iframe 
            id="videoFrame" 
            src="" 
            allowfullscreen 
            sandbox="allow-scripts allow-same-origin" 
            referrerpolicy="no-referrer">
        </iframe>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const iframe = document.getElementById("videoFrame");
            const params = new URLSearchParams(window.location.search);
            const r = params.get("r");

            if (r) {
                try {
                    // Decodifica y carga
                    const decodedUrl = atob(r);
                    iframe.src = decodedUrl;
                } catch (e) {
                    console.error("Error en enlace");
                }
            }
        });
    </script>
</body>
</html>
