<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maik Sport - Player Pro</title>
    <meta name="referrer" content="no-referrer">
    <style>
        /* Pantalla completa sin bordes */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
        }

        /* CONTENEDOR MAESTRO PARA EL RECORTE */
        .pantalla-limpia {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* TRUCO DE ZOOM Y DESPLAZAMIENTO:
           - Aumentamos la escala (zoom) para que los bordes se salgan.
           - Ajustamos el top para centrar el área del video.
        */
        #videoFrame {
            position: absolute;
            width: 100%;
            height: 100%;
            /* Escalamos un 130% para empujar footer y header hacia afuera */
            transform: scale(1.35); 
            /* Ajustamos la posición vertical para ocultar lo de arriba */
            top: 25px; 
            left: 0;
            border: none;
        }

        /* Botón Volver Minimalista */
        .btn-regresar {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 50px;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 13px;
            border: 1px solid #60a5fa;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="btn-regresar">⬅ Volver</a>

    <div class="pantalla-limpia">
        <iframe 
            id="videoFrame" 
            src="" 
            allowfullscreen 
            /* Añadimos allow-forms para evitar el error de protección anti-sandbox.
               Mantenemos bloqueado allow-popups para que no salte publicidad.
            */
            sandbox="allow-scripts allow-same-origin allow-forms" 
            referrerpolicy="no-referrer">
        </iframe>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const iframe = document.getElementById("videoFrame");
            const params = new URLSearchParams(window.location.search);
            const r = params.get("r");

            if (r) {
                try {
                    iframe.src = atob(r);
                } catch (e) {
                    console.error("Link inválido");
                }
            }
        });
    </script>
</body>
</html>
