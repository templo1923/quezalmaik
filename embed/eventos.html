<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAIK SPORT LIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* RESET TOTAL: Limpio y directo */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body, html { 
            height: 100%; 
            background: #0f172a; /* Azul muy oscuro, profesional */
            color: white; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* HEADER QUE NO ESTORBA */
        header { 
            background: #1e3a8a; 
            padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: 1px; }
        .back-btn { color: white; text-decoration: none; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 5px; font-size: 13px; }

        /* CONTENEDOR PRINCIPAL: Centra todo sin mochar nada */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        /* REPRODUCTOR: El alma de la web */
        .player-container {
            width: 100%;
            max-width: 1100px; /* Tamaño ideal para PC */
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        /* EL VIDEO: Ocupa todo su espacio natural */
        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        /* CAPA INVISIBLE MAIK (Para matar anuncios al primer clic) */
        #guard {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            cursor: pointer;
            background: rgba(0,0,0,0.01);
        }

        /* BOTONES DE ACCIÓN: Modernos y claros */
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            display: flex; align-items: center; gap: 8px;
            transition: 0.3s;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-2px); }

        /* PUBLICIDAD: Lista para meter los banners */
        .ads {
            margin-top: 20px;
            width: 100%;
            max-width: 1100px;
            display: flex; gap: 10px;
        }
        .ad-slot {
            flex: 1;
            height: 90px;
            border: 1px dashed #334155;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #475569; font-size: 12px;
        }

        /* RESPONSIVE PARA CELULARES */
        @media (max-width: 768px) {
            body { overflow-y: auto; }
            main { padding: 0; justify-content: flex-start; margin-top: 10px; }
            .player-container { border-radius: 0; }
            .ads { flex-direction: column; padding: 10px; }
            .ad-slot { height: 70px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">⚽ MAIK SPORT</div>
        <a href="../agenda.html" class="back-btn"><i class="fas fa-arrow-left"></i> VOLVER</a>
    </header>

    <main>
        <div style="background: #ef4444; padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 10px;">EN VIVO</div>
        
        <div class="player-container">
            <div id="guard"></div>
            <iframe id="vFrame" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts" allowfullscreen></iframe>
        </div>

        <div class="controls">
            <button class="btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i> RECARGAR</button>
            <button class="btn" onclick="toggleFS()"><i class="fas fa-expand"></i> PANTALLA COMPLETA</button>
        </div>

        <div class="ads">
            <div class="ad-slot">PUBLICIDAD 1</div>
            <div class="ad-slot">PUBLICIDAD 2</div>
        </div>
    </main>

    <script>
        // Sincronizar canal
        const r = new URLSearchParams(window.location.search).get("r");
        if (r) document.getElementById("vFrame").src = atob(r);

        // Quitar capa protectora
        document.getElementById('guard').addEventListener('click', function() {
            this.remove();
            window.open = () => null; // Bloqueo de popups basura
        });

        // Pantalla completa pro
        function toggleFS() {
            const el = document.querySelector('.player-container');
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
