<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAIK SPORT PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* RESET GENERAL */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        /* EL SECRETO: FLEXBOX EN EL BODY */
        body, html { 
            height: 100%; 
            background: #0d1b2a; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Evita scrolls raros si todo cabe */
        }

        /* HEADER */
        header { 
            background: linear-gradient(90deg, #1e3a8a, #60a5fa); 
            padding: 10px 20px; 
            flex-shrink: 0; /* Que el header no se encoja */
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.5); 
        }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .header-title { display: flex; align-items: center; gap: 10px; }
        .header-title h1 { color: #ffffff; font-size: 20px; font-weight: 900; }
        
        .back-button { 
            background: rgba(255,255,255,0.1); border-radius: 50%; width: 35px; height: 35px; 
            color: #ffffff; display: flex; align-items: center; justify-content: center; text-decoration: none; 
        }

        /* VISTA PRINCIPAL (RESPONSIVE) */
        .main-view {
            flex: 1; /* Ocupa todo el espacio restante */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centra el contenido verticalmente si sobra espacio */
            padding: 10px;
        }

        .live-text { 
            font-size: 11px; font-weight: 700; color: #ffffff; 
            margin-bottom: 8px; background: #ef4444; 
            padding: 4px 12px; border-radius: 20px; 
            display: inline-flex; align-items: center; gap: 6px;
        }
        .dot { width: 8px; height: 8px; background: white; border-radius: 50%; animation: pulse 1.5s infinite; }

        /* REPRODUCTOR INTELIGENTE: Adapta ancho y alto */
        .embed-responsive { 
            position: relative; 
            /* PC: Ocupa casi todo el ancho (85%) hasta 1300px para eliminar el negro lateral */
            width: 85%; 
            max-width: 1300px; 
            padding-top: 56.25%; /* Proporción 16:9 */
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            background: #000;
        }
        .embed-responsive iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* GUARD */
        #maik-guard {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: pointer; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }
        #maik-guard i { font-size: 40px; color: white; background: #3b82f6; padding: 15px; border-radius: 50%; }

        /* BOTONES DE ACCIÓN */
        .action-btns { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-shrink: 0; }
        .btn-pro { 
            padding: 10px 20px; border: none; border-radius: 8px; 
            background: #27272a; color: #ffffff; cursor: pointer; font-size: 13px; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-pro:hover { background: #1e40af; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* AJUSTE PARA MÓVILES (Para que no se salga) */
        @media (max-width: 768px) {
            .embed-responsive { width: 100%; border-radius: 0; }
            .main-view { padding: 0; margin-top: 10px; }
            .live-text { margin-bottom: 5px; }
            .action-btns { margin-bottom: 20px; } /* Espacio al final en móvil */
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-title">
                <span style="font-size: 22px;">⚽</span>
                <h1>MAIK SPORT</h1>
            </div>
            <a href="../agenda.html" class="back-button"><i class="fas fa-arrow-left"></i></a>
        </div>
    </header>

    <div class="main-view">
        <div class="live-text">
            <div class="dot"></div> EN VIVO
        </div>

        <div class="embed-responsive">
            <div id="maik-guard"><i class="fas fa-play"></i></div>
            <iframe id="videoFrame" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts" allowfullscreen></iframe>
        </div>

        <div class="action-btns">
            <button class="btn-pro" onclick="location.reload()">
                <i class="fas fa-redo"></i> Recargar
            </button>
            <button class="btn-pro" onclick="toggleFS()">
                <i class="fas fa-expand"></i> Pantalla Completa
            </button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('../sw.js');
        }

        const iframe = document.getElementById("videoFrame");
        const guard = document.getElementById("maik-guard");
        const params = new URLSearchParams(window.location.search);
        const encodedUrl = params.get("r");

        if (encodedUrl) { iframe.src = atob(encodedUrl); }

        guard.addEventListener('click', function() {
            this.style.display = 'none';
            window.open = function() { return null; };
        });

        function toggleFS() {
            const el = document.querySelector('.embed-responsive');
            if (!document.fullscreenElement) {
                if (el.requestFullscreen) el.requestFullscreen();
                else iframe.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
