<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        /* Ocupamos el 100% de la pantalla sin scroll */
        body, html { 
            height: 100%; 
            background: #0d1b2a; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        header { 
            background: linear-gradient(90deg, #1e3a8a, #60a5fa); 
            padding: 10px 20px; 
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.5); 
            flex-shrink: 0; /* Que el header no se encoja */
        }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .header-title h1 { color: #ffffff; font-size: 22px; font-weight: 900; }
        
        .back-button { 
            background: rgba(255,255,255,0.1); border-radius: 50%; width: 35px; height: 35px; 
            color: #ffffff; display: flex; align-items: center; justify-content: center; text-decoration: none; 
        }

        /* EL TRUCO: El contenedor ocupa el resto de la pantalla */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        /* El video no puede ser más alto que el 70% de la pantalla */
        .video-box { 
            width: 100%;
            max-width: 1000px; /* Ancho máximo para que no se vea estirado */
            max-height: 70vh; /* Máximo 70% del alto de la pantalla */
            position: relative; 
            aspect-ratio: 16 / 9; 
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        iframe { width: 100%; height: 100%; border: none; }

        #maik-guard {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: pointer; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }
        #maik-guard i { font-size: 40px; color: white; background: #3b82f6; padding: 15px; border-radius: 50%; }

        .action-btns { margin-top: 15px; display: flex; gap: 10px; flex-shrink: 0; }
        .btn-pro { 
            padding: 10px 20px; border: none; border-radius: 8px; 
            background: linear-gradient(90deg, #3b82f6, #1e40af); 
            color: #ffffff; cursor: pointer; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }

        @media (max-width: 768px) {
            .video-box { border-radius: 0; max-height: none; }
            .main-container { padding: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 25px;">⚽</span>
                <h1>MAIK SPORT</h1>
            </div>
            <a href="../agenda.html" class="back-button"><i class="fas fa-arrow-left"></i></a>
        </div>
    </header>

    <div class="main-container">
        <div style="background: #ef4444; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 10px;">
            EN VIVO
        </div>

        <div class="video-box">
            <div id="maik-guard"><i class="fas fa-play"></i></div>
            <iframe id="vFrame" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts" allowfullscreen></iframe>
        </div>

        <div class="action-btns">
            <button class="btn-pro" onclick="location.reload()"><i class="fas fa-redo"></i> Recargar</button>
            <button class="btn-pro" onclick="toggleFS()"><i class="fas fa-expand"></i> Pantalla Completa</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
        const r = new URLSearchParams(window.location.search).get("r");
        if (r) document.getElementById("vFrame").src = atob(r);

        document.getElementById('maik-guard').addEventListener('click', function() {
            this.remove();
            window.open = () => null;
        });

        function toggleFS() {
            const el = document.querySelector('.video-box');
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
