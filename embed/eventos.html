<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAIK SPORT - Player Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-page: #0a0a0c;
            --bg-player: #000000;
            --accent: #22c55e;
            --maik-blue: #1e40af;
            --text: #ffffff;
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100%; 
            background-color: var(--bg-page); 
            font-family: 'Segoe UI', sans-serif; 
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; /* Evita el scroll lateral que le molestó */
        }

        /* -----------------------------------------------------------
           CONTENEDOR INTELIGENTE (Responsive Real)
        ----------------------------------------------------------- */
        .cinema-container {
            width: 95%; /* En móviles casi total */
            max-width: 1400px; /* En PC gigante pero con tope */
            margin: 20px auto; 
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Marco del video (Mantiene siempre la forma 16:9) */
        .player-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; 
            background-color: var(--bg-player);
            border-radius: 8px 8px 0 0; /* Solo bordes arriba */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; z-index: 1;
        }

        /* CAPA MAIK GUARD */
        #maik-guard {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; cursor: pointer; background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }
        #maik-guard i { 
            color: white; font-size: 50px; 
            background: rgba(30, 64, 175, 0.9); width: 80px; height: 80px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; border: 2px solid var(--maik-blue);
        }

        /* CONTROLES DEBAJO DEL VIDEO */
        .maik-controls {
            width: 100%;
            background: #141417;
            border-radius: 0 0 8px 8px;
            padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .live-indicator { display: flex; align-items: center; gap: 8px; color: #ccc; font-size: 13px; font-weight: bold; }
        .live-dot { height: 10px; width: 10px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }

        .ctrl-right { display: flex; gap: 10px; }
        .ctrl-btn {
            background: #27272a; border: none; color: white; 
            width: 40px; height: 40px; border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
        }
        .ctrl-btn:hover { background: var(--maik-blue); }

        /* ZONA DE PUBLICIDAD (Banners) */
        .ads-placeholder {
            width: 100%; max-width: 1400px;
            margin-top: 20px; padding: 20px;
            text-align: center; color: #444; border: 1px dashed #333;
            box-sizing: border-box; border-radius: 8px;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* AJUSTE PARA MÓVILES (Para que no se salga de la pantalla) */
        @media (max-width: 768px) {
            .cinema-container { width: 100%; margin-top: 0; }
            .player-wrapper { border-radius: 0; }
            .maik-controls { border-radius: 0; }
        }
    </style>
</head>
<body>

    <div class="cinema-container">
        <div class="player-wrapper">
            <div id="maik-guard"><i class="fas fa-play"></i></div>
            <iframe id="video-frame" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="maik-controls">
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span>EN VIVO MAIK SPORT</span>
            </div>
            <div class="ctrl-right">
                <button class="ctrl-btn" onclick="location.reload();"><i class="fas fa-sync-alt"></i></button>
                <button class="ctrl-btn" onclick="toggleFS();"><i class="fas fa-expand"></i></button>
                <button class="ctrl-btn" onclick="location.href='../agenda.html';" style="background:#450a0a;"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>

    <div class="ads-placeholder">
        <i class="fas fa-dollar-sign"></i> Zona de Publicidad (Banner 728x90 aquí)
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('../sw.js');
        }

        const params = new URLSearchParams(window.location.search);
        const r = params.get("r");
        const iframe = document.getElementById('video-frame');
        const guard = document.getElementById('maik-guard');

        if (r) { iframe.src = atob(r); }

        guard.addEventListener('click', function() {
            this.style.display = 'none';
            window.open = function() { return null; };
        });

        function toggleFS() {
            if (!document.fullscreenElement) {
                document.querySelector('.cinema-container').requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
