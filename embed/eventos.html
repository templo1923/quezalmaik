<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Live Streaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

body, html { 
    height: 100%; 
    background: radial-gradient(circle, #1e293b 0%, #080c14 100%); 
    color: #f1f5f9; 
    display: flex; 
    flex-direction: column; 
    overflow-x: hidden;
    overflow-y: auto;
}

header { 
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(12px);
    padding: 12px 20px; 
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6); 
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 1000;
}
.header-content { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.header-title { display: flex; align-items: center; gap: 12px; }
.header-title i { color: #60a5fa; font-size: 24px; }
.header-title h1 { color: #ffffff; font-size: 22px; font-weight: 900; }

.back-button { 
    background: rgba(255,255,255,0.05); border-radius: 50%; width: 38px; height: 38px; 
    display: flex; align-items: center; justify-content: center; color: white; text-decoration: none;
}

.main-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start; 
    padding: 20px 10px;
    width: 100%;
}

.live-badge { 
    background: linear-gradient(90deg, #ef4444, #b91c1c); 
    padding: 4px 14px; border-radius: 20px; font-size: 10px; font-weight: 800; margin-bottom: 15px;
    display: flex; align-items: center; gap: 6px; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
}

/* LA CAJA NEGRA (SE QUEDA IGUAL) */
.video-box { 
    width: 100%;
    max-width: 1000px; 
    position: relative; 
    aspect-ratio: 16 / 9; 
    background: #000;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
}

/* EL VIDEO INTERNO (AQUÍ ESTÁ EL ARREGLO) */
.video-box iframe {
    position: absolute;
    width: 116%; /* Bajé de 124% para que no se salga */
    height: 92%; /* Bajé de 100% para que se vea la barra de abajo */
    left: -8%;   /* Centrado para que no se moche */
    top: 0;
    border: none;
}

#maik-guard { position: absolute; width: 100%; height: 100%; z-index: 10; cursor: pointer; background: rgba(0,0,0,0.1); }

.action-btns { margin: 20px 0; display: flex; gap: 12px; }
.btn-pro { padding: 10px 20px; border-radius: 10px; background: #1e40af; border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; font-weight: 600; }

.ads-row { width: 100%; max-width: 1000px; display: flex; gap: 15px; margin-top: 10px; }
.ad-box { flex: 1; height: 90px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #4b5563; font-size: 12px; }

@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

@media (max-width: 768px) {
    .video-box { border-radius: 0; }
    .video-box iframe { width: 130%; left: -15%; height: 90%; }
    .main-container { padding: 0; }
    .ads-row { flex-direction: column; padding: 10px; }
    .ad-box { height: 70px; }
}
</style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-title">
                <i class="fas fa-broadcast-tower"></i>
                <h1>MAIK SPORT <span style="font-weight: 300; color: #60a5fa;">LIVE</span></h1>
            </div>
            <a href="../agenda.html" class="back-button"><i class="fas fa-arrow-left"></i></a>
        </div>
    </header>

    <div class="main-container">
        <div class="live-badge">
            <div style="width:8px; height:8px; background:white; border-radius:50%; animation:pulse 1.5s infinite;"></div> 
            EN VIVO
        </div>

        <div class="video-box">
            <div id="maik-guard"></div>
            <iframe id="vFrame" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts" allowfullscreen></iframe>
        </div>

        <div class="action-btns">
            <button class="btn-pro" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Recargar</button>
            <button class="btn-pro" onclick="toggleFS()"><i class="fas fa-expand-arrows-alt"></i> Pantalla Completa</button>
        </div>

        <div class="ads-row">
            <div class="ad-box">Publicidad 1</div>
            <div class="ad-box">Publicidad 2</div>
        </div>
    </div>
    
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
        const r = new URLSearchParams(window.location.search).get("r");
        if (r) document.getElementById("vFrame").src = atob(r);

        document.getElementById('maik-guard').addEventListener('click', function() {
            this.style.opacity = '0';
            setTimeout(() => this.remove(), 500);
            window.open = () => null;
        });

        function toggleFS() {
            const el = document.querySelector('.video-box');
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
