<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Señal Activa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .wrapper { position: relative; width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Capa invisible de protección (Su idea original que funcionaba) */
        #maik-guard {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: pointer; background: rgba(0,0,0,0);
        }

        /* Su Diseño Vacano encima */
        header {
            position: absolute; top: 0; left: 0; width: 100%;
            background: linear-gradient(90deg, #1e3a8a, #60a5fa);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            z-index: 20; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div style="color:white; font-weight:900;">⚽ MAIK SPORT</div>
            <a href="../agenda.html" style="color:white; font-size:20px;"><i class="fas fa-times"></i></a>
        </header>

        <div id="maik-guard"></div>

        <iframe id="video-frame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <script>
        <script>
    // 1. ACTIVAR EL ESCUDO (Service Worker)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('../sw.js')
            .then(reg => console.log('🛡️ Escudo Maik Sport Activo'))
            .catch(err => console.error('❌ Error al activar escudo', err));
    }

    // ... aquí sigue el resto de tu código de carga ...

        
        const params = new URLSearchParams(window.location.search);
        const r = params.get("r");
        const iframe = document.getElementById('video-frame');
        const guard = document.getElementById('maik-guard');

        if (r) {
            // Carga directa sin proxies que fallen
            iframe.src = atob(r);
        }

        // Blindaje original de Maikol
        guard.addEventListener('click', function() {
            this.style.display = 'none';
            window.open = function() { return null; };
        });

        // Evitar que el iframe robe el foco para abrir basura
        setInterval(() => {
            if (document.activeElement === iframe) {
                window.focus();
            }
        }, 1000);
    </script>
</body>
</html>
