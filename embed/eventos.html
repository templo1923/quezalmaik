<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Señal Limpia</title>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@0.8/dist/clappr.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #player { width: 100%; height: 100%; }
        
        /* Pantalla de carga profesional */
        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 99;
        }
        .spinner { color: #22c55e; font-size: 50px; animation: fa-spin 1.5s infinite linear; }
        .loading-text { color: white; margin-top: 20px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-circle-notch spinner"></i>
        <p class="loading-text">Extrayendo señal Maik Sport...</p>
    </div>

    <div id="player"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const r = params.get("r");

async function cargarSeñal() {
    if (!r) return;
    const urlDecodificada = atob(r);
    const queryParams = urlDecodificada.split('?')[1];

    try {
        const response = await fetch(`/api/get-source?${queryParams}`);
        const htmlCode = await response.text();
        const match = htmlCode.match(/var playbackURL = "(.*?)";/);

        if (match && match[1]) {
            let m3u8Limpio = match[1];
            
            // LA MAGIA: Pasamos el link del video por nuestro proxy de Vercel
            // Esto oculta que vienes de tu web y ayuda a saltar el 403
            const videoProxy = m3u8Limpio.replace("https://", "/api/video/");

            document.getElementById("loader").style.display = "none";

            new Clappr.Player({
                source: videoProxy,
                parentId: "#player",
                width: "100%",
                height: "100%",
                autoPlay: true,
                // Agregamos esto para que el navegador no envíe tu dominio en el referer
                hlsjsConfig: {
                    xhrSetup: function(xhr, url) {
                        xhr.withCredentials = false;
                    }
                },
                mediacontrol: {seekbar: "#22c55e", buttons: "#FFFFFF"},
                mimeType: "application/x-mpegURL"
            });
        } else {
            document.getElementById("loader").innerHTML = "<p style='color:red;'>Señal no encontrada.</p>";
        }
    } catch (error) {
        document.getElementById("loader").innerHTML = "<p style='color:white;'>Error de conexión. Reintenta.</p>";
    }
}

        // Ejecutar la función
        cargarSeñal();

        // Blindaje total contra ventanas emergentes
        window.open = function() { return null; };
    </script>
</body>
</html>
