<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maik Sport - Player Pro</title>
    <meta name="referrer" content="no-referrer">
    <style>
        /* Fondo negro total para que nada distraiga */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; }

        /* Contenedor que forzará al video a ocupar todo el espacio */
        .master-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* EL TRUCO: Escalamos el iframe y lo desplazamos con precisión quirúrgica 
           para que el 'header' y el 'footer' queden fuera del área visible. */
        #videoFrame {
            position: absolute;
            width: 100%;
            height: 100%;
            /* Escalamos para que el video se estire y tape los bordes de la web original */
            transform: scale(1.4); 
            /* Ajustamos la posición para centrar el reproductor de Capo */
            top: 40px; 
            left: 0;
            border: none;
        }

        /* Botón Volver (Flotante y elegante) */
        .btn-back {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.7);
            color: #60a5fa;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-weight: bold;
            border: 1px solid #60a5fa;
        }

        /* Capa de protección: Evita que toquen botones de publicidad invisibles */
        .bloqueador-ads {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50; /* Por debajo del botón volver, por encima del iframe */
            pointer-events: none; /* Deja pasar los clics al reproductor central */
        }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="btn-back">⬅ VOLVER</a>

    <div class="master-container">
        <div class="bloqueador-ads"></div>
        
        <iframe 
            id="videoFrame" 
            src="" 
            allowfullscreen 
            sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock"
            referrerpolicy="no-referrer">
        </iframe>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const iframe = document.getElementById("videoFrame");
            const params = new URLSearchParams(window.location.search);
            const r = params.get("r");

            if (r) {
                try {
                    const decodedUrl = atob(r);
                    iframe.src = decodedUrl;
                } catch (e) {
                    console.error("Link erróneo");
                }
            }
        });
    </script>
</body>
</html>
