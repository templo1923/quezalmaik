<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Agenda Oficial</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        header { background: linear-gradient(90deg, #1e3a8a, #60a5fa); padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .agenda-list { list-style: none; padding: 0; max-width: 800px; margin: 0 auto; }
        .evento { background: #0f172a; margin-bottom: 10px; padding: 15px; border-radius: 10px; border: 1px solid #333; cursor: pointer; }
        .evento:hover { border-color: #22c55e; }
        .fila { display: flex; align-items: center; gap: 15px; }
        time { background: #22c55e; color: black; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .canales { display: none; padding: 15px 0 0 50px; }
        .canales a { color: #86efac; text-decoration: none; display: block; margin-bottom: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>⚽ MAIK SPORT</h1>
        <h2 id="title-agenda">Cargando partidos...</h2>
    </header>

    <ul id="menu" class="agenda-list"></ul>

    <script>
        const AGENDA_URL = "https://pltvhd.com/diaries.json";
        const IMG_BASE = "https://pltvhd.com";

        async function cargar() {
            try {
                const res = await fetch(AGENDA_URL);
                const json = await res.json();
                let html = "";

                json.data.forEach(ev => {
                    const attr = ev.attributes;
                    const hora = attr.diary_hour.substring(0, 5);
                    const flag = attr.country?.data?.attributes?.image?.data?.attributes?.url;
                    const img = flag ? (flag.startsWith('http') ? flag : IMG_BASE + flag) : "";

                    html += `
                        <li class="evento" onclick="$(this).find('.canales').slideToggle()">
                            <div class="fila">
                                <time>${hora}</time>
                                <img src="${img}">
                                <strong>${attr.diary_description}</strong>
                            </div>
                            <div class="canales">
                                ${attr.embeds.data.map(em => `
                                    <a href=".${em.attributes.embed_iframe}">▶ ${em.attributes.embed_name}</a>
                                `).join('')}
                            </div>
                        </li>`;
                });
                document.getElementById("menu").innerHTML = html;
                document.getElementById("title-agenda").innerText = "Partidos de Hoy";
            } catch (e) { document.getElementById("title-agenda").innerText = "Error al cargar"; }
        }
        cargar();
    </script>
</body>
</html>
