<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Señal en Vivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* RESET Y FUENTES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        /* EL TRUCO: min-height y display flex para centrar todo verticalmente */
        body { 
            background: #0d1b2a; 
            color: #e0e0e0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Evita el scroll innecesario en PC */
        }

        /* HEADER DISEÑO ORIGINAL (Ajustado a 10% de altura aprox) */
        header { 
            background: linear-gradient(90deg, #1e3a8a, #60a5fa); 
            padding: 10px 20px; 
            z-index: 1000; 
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.5); 
            width: 100%;
        }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .header-title h1 { color: #ffffff; font-size: 22px; font-weight: 900; }
        .soccer-ball { font-size: 28px; color: #ffffff; animation: spin 3s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .back-button { 
            background: rgba(0,0,0,0.3); border-radius: 50%; width: 40px; height: 40px; 
            color: #ffffff; font-size: 18px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; text-decoration: none; 
            transition: 0.3s;
        }
        .back-button:hover { background: #ef4444; }

        /* VISTA PRINCIPAL: ESTO centra el video en el espacio que sobra */
        .main-view {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* CONTENEDOR CENTRAL LOGICO */
        .content-container { 
            width: 100%;
            max-width: 1000px; /* Tamaño justo para PC */
            text-align: center; 
        }

        .live-text { 
            font-size: 12px; font-weight: 700; color: #ffffff; 
            margin-bottom: 12px; background: #ef4444; 
            padding: 5px 12px; border-radius: 20px; 
            display: inline-flex; align-items: center; gap: 6px;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }
        .dot { width: 8px; height: 8px; background: white; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* REPRODUCTOR CON BLINDAJE */
        .embed-responsive { 
            position: relative; width: 100%; padding-top: 56.25%; 
            border-radius: 12px; overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            background: #000;
        }
        .embed-responsive iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* CAPA DE CLIC (GUARD) */
        #maik-guard {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: pointer; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }
        #maik-guard i { font-size: 45px; color: white; background: #3b82f6; padding: 18px; border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* BOTONES DE ACCION COMPACTOS */
        .action-btns { margin-top: 15px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        
        .btn-pro { 
            padding: 10px 20px; border: none; border-radius: 8px; 
            background: linear-gradient(90deg, #3b82f6, #1e40af); 
            color: #ffffff; cursor: pointer; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-pro:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }
        .btn-full { background: linear-gradient(90deg, #10b981, #059669); }

        /* AJUSTES PARA MÓVILES */
        @media (max-width: 768px) {
            body { overflow-y: auto; } /* Permite scroll en móvil si es necesario */
            .main-view { padding: 10px; }
            .content-container { max-width: 100%; }
            .embed-responsive { border-radius: 8px; }
            .header-title h1 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-title" style="display: flex; align-items: center; gap: 10px;">
                <span class="soccer-ball">⚽</span>
                <h1>MAIK SPORT</h1>
            </div>
            <a href="../agenda.html" class="back-button"><i class="fas fa-arrow-left"></i></a>
        </div>
    </header>

    <div class="main-view">
        <div class="content-container">
            <div class="live-text">
                <div class="dot"></div> EN VIVO
            </div>

            <div class="embed-responsive">
                <div id="maik-guard"><i class="fas fa-play"></i></div>
                <iframe id="videoFrame" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts" allowfullscreen></iframe>
            </div>

            <div class="action-btns">
                <button class="btn-pro" onclick="location.reload()">
                    <i class="fas fa-redo"></i> Recargar
                </button>
                <button class="btn-pro btn-full" onclick="toggleFS()">
                    <i class="fas fa-expand"></i> Pantalla Completa
                </button>
            </div>
        </div>
    </div>

    <script>
        // ESCUDO CONTRA ANUNCIOS
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('../sw.js');
        }

        const iframe = document.getElementById("videoFrame");
        const guard = document.getElementById("maik-guard");
        const params = new URLSearchParams(window.location.search);
        const encodedUrl = params.get("r");

        if (encodedUrl) {
            try {
                iframe.src = atob(encodedUrl);
            } catch (e) {
                console.error("Error decodificando URL");
            }
        }

        guard.addEventListener('click', function() {
            this.style.display = 'none';
            // Bloqueo de popups adicionales al primer clic
            window.open = function() { return null; };
        });

        function toggleFS() {
            const el = document.querySelector('.embed-responsive');
            if (!document.fullscreenElement) {
                if (el.requestFullscreen) {
                    el.requestFullscreen();
                } else if (iframe.requestFullscreen) {
                    iframe.requestFullscreen();
                }
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
