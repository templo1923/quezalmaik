<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Señal Limpia</title>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@0.8/dist/clappr.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #player { width: 100%; height: 100%; }
        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 99;
        }
        .spinner { color: #22c55e; font-size: 40px; animation: fa-spin 1s infinite linear; }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-spinner spinner"></i>
        <p style="color:white; margin-top:15px; font-weight:bold;">EXTRAYENDO SEÑAL MAIK SPORT...</p>
    </div>

    <div id="player"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const r = params.get("r");

        async function cargarSeñal() {
            if (!r) return;
            const urlDestino = atob(r);

            try {
                // Pedimos el contenido a través del proxy
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(urlDestino)}`);
                const data = await response.json();
                const source = data.contents;

                // Buscamos el playbackURL (esto es lo que extrae el link del JSON que me mostraste)
                const match = source.match(/var playbackURL = "(.*?)";/);

                if (match && match[1]) {
                    const m3u8Limpio = match[1];
                    document.getElementById("loader").style.display = "none";

                    // Lanzamos el reproductor
                    new Clappr.Player({
                        source: m3u8Limpio,
                        parentId: "#player",
                        width: "100%",
                        height: "100%",
                        autoPlay: true,
                        mediacontrol: {seekbar: "#22c55e", buttons: "#FFFFFF"},
                        mimeType: "application/x-mpegURL"
                    });
                } else {
                    document.getElementById("loader").innerHTML = "<p style='color:red;'>No se encontró playbackURL en el origen.</p>";
                }
            } catch (error) {
                console.error(error);
                document.getElementById("loader").innerHTML = "<p style='color:white;'>Error de conexión. Reintenta.</p>";
            }
        }

        cargarSeñal();
        // Bloqueo de popups por si acaso
        window.open = function() { return null; };
    </script>
</body>
</html>
