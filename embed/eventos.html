<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIK SPORT - Player Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@0.8/dist/clappr.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; color: white; overflow: hidden; }

        /* Header con tu estilo azul */
        header { 
            background: linear-gradient(90deg, #1e3a8a, #60a5fa); 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: 1px; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; transition: 0.3s; }
        .back-btn:hover { color: #ef4444; }

        /* Área del reproductor */
        #player-container { 
            flex-grow: 1; 
            position: relative; 
            background: radial-gradient(circle, #111, #000); 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #player { width: 100%; height: 100%; }

        /* Pantalla de carga vacana */
        #loader {
            position: absolute;
            text-align: center;
            z-index: 5;
        }
        .spinner {
            font-size: 45px;
            color: #22c55e;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">⚽ MAIK SPORT</div>
        <a href="../agenda.html" class="back-btn"><i class="fas fa-times"></i></a>
    </header>

    <div id="player-container">
        <div id="loader">
            <i class="fas fa-circle-notch spinner"></i>
            <p>Extrayendo señal limpia...</p>
        </div>
        <div id="player"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const r = params.get("r");

        async function cargarSeñalLimpia() {
            if (!r) {
                document.getElementById('loader').innerHTML = "Error: No hay parámetro de señal.";
                return;
            }

            try {
                // 1. Decodificamos la URL (Ej: https://tvtvhd.com/canales.php?stream=espn)
                const urlADescifrar = atob(r);

                // 2. Usamos un proxy para leer el contenido de esa URL sin que nos bloqueen
                // AllOrigins es bueno para pruebas, luego puedes usar el tuyo de Vercel
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(urlADescifrar)}`;
                
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const htmlCode = data.contents;

                // 3. LA MAGIA: Buscamos "var playbackURL = '...'" dentro del código de ellos
                const regex = /var playbackURL = "(.*?)";/;
                const match = htmlCode.match(regex);

                if (match && match[1]) {
                    const m3u8Real = match[1];
                    
                    // Ocultamos el cargador
                    document.getElementById('loader').style.display = 'none';

                    // 4. Arrancamos el Clappr con el link real y limpio
                    var player = new Clappr.Player({
                        source: m3u8Real,
                        parentId: "#player",
                        width: "100%",
                        height: "100%",
                        autoPlay: true,
                        mediacontrol: {seekbar: "#22c55e", buttons: "#FFFFFF"},
                        mimeType: "application/x-mpegURL"
                    });
                } else {
                    throw new Error("No se encontró el link playbackURL");
                }

            } catch (error) {
                console.error("Fallo al extraer señal:", error);
                document.getElementById('loader').innerHTML = 
                    `<i class="fas fa-exclamation-triangle" style="color:#ef4444; font-size:30px;"></i><p style="margin-top:10px;">Señal caída o bloqueada.<br>Intenta de nuevo.</p>`;
            }
        }

        // Ejecutar
        cargarSeñalLimpia();

        // Blindaje extra: Bloqueamos popups por si el proxy trae basura
        window.open = function() { return null; };
    </script>
</body>
</html>
