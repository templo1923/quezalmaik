<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maik Sport - Modo Cine</title>
    <meta name="referrer" content="no-referrer">
    <style>
        /* Fondo oscuro profesional */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            background: #0b0f1a; /* Azul muy oscuro */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Contenedor del reproductor "Bonito" */
        .player-card {
            width: 95%;
            max-width: 900px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 15px rgba(96, 165, 250, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        /* Proporción 16:9 */
        .video-container {
            position: relative;
            padding-top: 56.25%; /* Relación de aspecto 16:9 */
            background: #000;
        }

        #videoFrame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Botón de cerrar/volver elegante */
        .btn-cerrar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .btn-cerrar:hover { background: #ef4444; }

        /* Texto de apoyo */
        .info-footer {
            padding: 15px;
            text-align: center;
            color: #60a5fa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="btn-cerrar">✕ CERRAR MODO CINE</a>

    <div class="player-card">
        <div class="video-container">
            <iframe 
                id="videoFrame" 
                src="" 
                allowfullscreen 
                allow="autoplay; encrypted-media"
                referrerpolicy="no-referrer">
            </iframe>
        </div>
        <div class="info-footer">Maik Sport - Señal en Vivo</div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const iframe = document.getElementById("videoFrame");
            const params = new URLSearchParams(window.location.search);
            const r = params.get("r");

            if (r) {
                try {
                    // Cargamos la URL decodificada
                    iframe.src = atob(r);
                } catch (e) {
                    console.error("Link no válido");
                }
            }
        });
    </script>
</body>
</html>
