<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAIK SPORT - Player Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
    :root {
        --bg-page: #0a0a0c;
        --accent: #22c55e;
        --maik-blue: #1e40af;
    }

    body, html { 
        margin: 0; padding: 0; min-height: 100%; 
        background-color: var(--bg-page); 
        font-family: sans-serif; 
        display: flex; flex-direction: column; align-items: center;
    }

    /* LA MAGIA: 1200px en PC, 100% en Celular */
    .cinema-container {
        width: 100%;
        max-width: 1200px; /* Tamaño estándar de video en web */
        margin: 0 auto;
        padding: 10px;
        box-sizing: border-box;
    }

    .player-wrapper {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%; /* Relación 16:9 perfecta */
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

    .maik-controls {
        width: 100%;
        background: #141417;
        margin-top: 10px;
        padding: 12px;
        border-radius: 8px;
        display: flex; justify-content: space-between; align-items: center;
        box-sizing: border-box;
    }

    /* SI ES CELULAR: Se pega a los bordes para no desperdiciar espacio */
    @media (max-width: 768px) {
        .cinema-container { padding: 0; }
        .player-wrapper, .maik-controls { border-radius: 0; }
    }
</style>


</head>
<body>

    <div class="cinema-container">
        <div class="player-wrapper">
            <div id="maik-guard"><i class="fas fa-play"></i></div>
            <iframe id="video-frame" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="maik-controls">
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span>EN VIVO MAIK SPORT</span>
            </div>
            <div class="ctrl-right">
                <button class="ctrl-btn" onclick="location.reload();"><i class="fas fa-sync-alt"></i></button>
                <button class="ctrl-btn" onclick="toggleFS();"><i class="fas fa-expand"></i></button>
                <button class="ctrl-btn" onclick="location.href='../agenda.html';" style="background:#450a0a;"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>

    <div class="ads-placeholder">
        <i class="fas fa-dollar-sign"></i> Zona de Publicidad (Banner 728x90 aquí)
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('../sw.js');
        }

        const params = new URLSearchParams(window.location.search);
        const r = params.get("r");
        const iframe = document.getElementById('video-frame');
        const guard = document.getElementById('maik-guard');

        if (r) { iframe.src = atob(r); }

        guard.addEventListener('click', function() {
            this.style.display = 'none';
            window.open = function() { return null; };
        });

        function toggleFS() {
            if (!document.fullscreenElement) {
                document.querySelector('.cinema-container').requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
