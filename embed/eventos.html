<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAIK SPORT - Player Pro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root {
    --bg-page:#0a0a0c;
    --maik-blue:#1e40af;
    --accent:#22c55e;
}

body{
    margin:0;
    background:var(--bg-page);
    font-family:sans-serif;
    color:white;
    overflow-x:hidden;
}

/* CONTENEDOR GENERAL */
.page {
    display:flex;
    justify-content:center;
    width:100%;
}

/* CONTENIDO CENTRAL */
.container {
    width:95%;
    max-width:1200px;
}

/* PLAYER */
.player-wrapper{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    background:black;
    border-radius:10px;
    overflow:hidden;
}

iframe{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
}

/* GUARD */
#maik-guard{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.4);
    cursor:pointer;
    z-index:5;
}

#maik-guard i{
    font-size:50px;
    background:var(--maik-blue);
    padding:20px;
    border-radius:50%;
}

/* CONTROLES */
.controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:#141417;
}

.live{
    display:flex;
    gap:8px;
    font-size:13px;
}

.dot{
    width:10px;
    height:10px;
    background:var(--accent);
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:1}
    50%{opacity:0.3}
    100%{opacity:1}
}

.btns{
    display:flex;
    gap:10px;
}

.btn{
    width:40px;
    height:40px;
    border:none;
    background:#27272a;
    color:white;
    border-radius:6px;
}

/* ADS ABAJO */
.ad-bottom{
    margin:20px 0;
    padding:15px;
    border:1px dashed #333;
    text-align:center;
    border-radius:10px;
}

/* ADS LATERALES SOLO EN PC GRANDE */
.ads-side{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:120px;
    height:600px;
    border:1px dashed #333;
    display:none;
    align-items:center;
    justify-content:center;
    color:#555;
}

.ads-left{ left:10px; }
.ads-right{ right:10px; }

/* SOLO PC */
@media(min-width:1300px){
    .ads-side{
        display:flex;
    }
}
</style>
</head>

<body>

<!-- ADS LATERALES -->
<div class="ads-side ads-left">Publicidad</div>
<div class="ads-side ads-right">Publicidad</div>

<div class="page">
<div class="container">

    <div class="player-wrapper">
        <div id="maik-guard"><i class="fas fa-play"></i></div>

        <iframe id="video-frame"
        sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts"
        allowfullscreen allow="autoplay; encrypted-media">
        </iframe>
    </div>

    <div class="controls">
        <div class="live">
            <div class="dot"></div>
            EN VIVO MAIK SPORT
        </div>

        <div class="btns">
            <button class="btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
            <button class="btn" onclick="toggleFS()"><i class="fas fa-expand"></i></button>
            <button class="btn" onclick="location.href='../agenda.html'"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div class="ad-bottom">
        Banner 728x90
    </div>

</div>
</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('../sw.js');
}

const params = new URLSearchParams(window.location.search);
const r = params.get("r");
const iframe = document.getElementById('video-frame');
const guard = document.getElementById('maik-guard');

if (r) { iframe.src = atob(r); }

guard.addEventListener('click', function() {
    this.style.display = 'none';
    window.open = function() { return null; };
});

function toggleFS() {
    if (!document.fullscreenElement) {
        document.querySelector('.player-wrapper').requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}
</script>

</body>
</html>
